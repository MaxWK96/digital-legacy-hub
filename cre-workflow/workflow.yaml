# ==========================================================================
# Digital Executor — CRE Workflow
# ==========================================================================
# Chainlink Convergence Hackathon 2026
#
# Trigger 0 (cron)  — Inactivity monitor: reads LifeContract, writes verdict
# Trigger 1 (HTTP)  — World ID verifier: calls Worldcoin API, writes verdict
#
# Simulate inactivity monitor:
#   npm run cre:simulate
#   cre workflow simulate ./cre-workflow --non-interactive --trigger-index 0 -T staging-settings
#
# Simulate World ID verifier:
#   npm run cre:worldid-simulate
#   cre workflow simulate ./cre-workflow --non-interactive --trigger-index 1 -T staging-settings

staging-settings:
  user-workflow:
    workflow-name: "digital-executor-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "./secrets.json"

production-settings:
  user-workflow:
    workflow-name: "digital-executor"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "./secrets.json"
